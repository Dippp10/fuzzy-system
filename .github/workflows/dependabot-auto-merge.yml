name: Dependabot Auto Merge

on:
  workflow_dispatch:               # Manual trigger
  schedule:
    - cron: "0 9 * * 1"           # Optional weekly run (Monday 09:00 UTC)
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: ${{ github.actor == 'dependabot[bot]' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Auto-merge patch updates
        uses: actions/github-script@v7
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50
            });

            for (const pr of prs) {
              if (pr.user.login !== 'dependabot[bot]') continue;
              if (!pr.title.toLowerCase().includes("patch")) continue;

              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: "merge"    // ✅ Ensures PR shows in PR tab
              });
              console.log(`Merged PR #${pr.number}: ${pr.title}`);
            }
