name: Dependabot Auto Merge

on:
  workflow_dispatch:               # Manual trigger
  schedule:
    - cron: "0 9 * * 1"           # Optional weekly run (Monday 09:00 UTC)
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Merge all open Dependabot patch PRs
      - name: Merge Dependabot patch PRs
        uses: actions/github-script@v7
        with:
          script: |
            // List open PRs
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 50
            });

            for (const pr of prs) {
              // Only Dependabot PRs
              if (pr.user.login !== 'dependabot[bot]') continue;

              // Only patch updates (x.y.Z)
              if (!pr.title.toLowerCase().includes("patch")) continue;

              // Merge PR using normal merge commit (shows in PR tab)
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: "merge"
              });

              console.log(`Merged PR #${pr.number}: ${pr.title}`);
            }
