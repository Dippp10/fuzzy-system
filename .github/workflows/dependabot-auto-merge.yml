name: Dependabot Auto Merge

# Can run on PR events or scheduled weekly
on:
  schedule:
    - cron: "0 9 * * 1"   # Every Monday 09:00 UTC
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Auto-merge patch updates
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            // Only merge patch updates (x.y.Z)
            if (pr.title.toLowerCase().includes("patch")) {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                merge_method: "squash"
              });
              console.log("Patch update merged automatically.");
            } else {
              console.log("Not a patch update. Manual review required.");
            }
